name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Download Gemma 2B Q4 TFLite model
        run: |
          MODEL_DIR="app/src/main/assets/ml"
          MODEL_FILE="$MODEL_DIR/gemma_2b_q4.tflite"
          mkdir -p "$MODEL_DIR"

          if [ -f "$MODEL_FILE" ]; then
            echo "Model already exists, skipping download"
          else
            echo "Downloading Gemma 2B Q4 TFLite model..."
            MODEL_URLS=(
              "https://huggingface.co/khanhptnk/gemma-2b-it-q4-tflite/resolve/main/gemma-2b-it-q4.tflite"
            )

            DOWNLOADED=false
            for URL in "${MODEL_URLS[@]}"; do
              echo "Trying: $URL"
              if wget -q --timeout=60 -O "$MODEL_FILE" "$URL" 2>/dev/null; then
                echo "Downloaded successfully from: $URL"
                DOWNLOADED=true
                break
              fi
              echo "Failed, trying next source..."
            done

            if [ "$DOWNLOADED" = false ]; then
              if [ -n "$KAGGLE_KEY" ] && [ -n "$KAGGLE_USERNAME" ]; then
                echo "Trying Kaggle download..."
                pip install -q kagglehub
                printf "%s\n" \
                  "import kagglehub, shutil, os" \
                  "path = kagglehub.model_download('google/gemma/tfLite/gemma-2b-it-gpu-int4')" \
                  "for root, dirs, files in os.walk(path):" \
                  "    for f in files:" \
                  "        if f.endswith('.tflite'):" \
                  "            shutil.copy(os.path.join(root, f), os.environ['MODEL_FILE'])" \
                  "            print('Copied ' + f + ' to model directory')" \
                  "            break" \
                  > /tmp/kaggle_download.py
                python3 /tmp/kaggle_download.py
                if [ -f "$MODEL_FILE" ]; then
                  DOWNLOADED=true
                fi
              fi
            fi

            if [ "$DOWNLOADED" = false ]; then
              echo "WARNING: Could not download model automatically."
              echo "The APK will be built without the model file."
              echo ""
              echo "To fix this manually:"
              echo "1. Download Gemma 2B IT GPU Int4 from: https://www.kaggle.com/models/google/gemma/tfLite"
              echo "2. Place the .tflite file at: app/src/main/assets/ml/gemma_2b_q4.tflite"
              echo "3. Commit and push, or re-run this workflow"
              touch "$MODEL_FILE"
            fi

            echo "Model file size: $(ls -lh "$MODEL_FILE" | awk '{print $5}')"
          fi

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: AI-Agent-APK
          path: app/build/outputs/apk/debug/*.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: github.ref == "refs/heads/main"
        with:
          tag_name: build-${{ github.run_number }}
          name: AI Agent Build #${{ github.run_number }}
          files: app/build/outputs/apk/debug/*.apk
          generate_release_notes: true
