name: Build APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
      - uses: gradle/actions/setup-gradle@v3
      - name: Download Gradle wrapper
        run: |
          mkdir -p gradle/wrapper
          curl -L -s -o gradle/wrapper/gradle-wrapper.jar \
            "https://raw.githubusercontent.com/gradle/gradle/v8.5.0/gradle/wrapper/gradle-wrapper.jar"
          chmod +x gradlew
      - name: Download Gemma 2B model
        run: |
          MODEL_DIR="app/src/main/assets/ml"
          MODEL_FILE="$MODEL_DIR/gemma_2b_q4.tflite"
          mkdir -p "$MODEL_DIR"
          if [ -f "$MODEL_FILE" ]; then
            echo "Model exists, skipping"
          else
            echo "Downloading model..."
            wget -q --timeout=60 -O "$MODEL_FILE" "https://huggingface.co/khanhptnk/gemma-2b-it-q4-tflite/resolve/main/gemma-2b-it-q4.tflite" || true
            if [ ! -f "$MODEL_FILE" ] || [ ! -s "$MODEL_FILE" ]; then
              echo "Download failed, building without model"
              touch "$MODEL_FILE"
            fi
          fi
      - name: Build with Gradle
        run: ./gradlew assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AI-Agent-APK
          path: app/build/outputs/apk/debug/*.apk
      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: github.ref == "refs/heads/main"
        with:
          tag_name: build-${{ github.run_number }}
          name: AI Agent Build ${{ github.run_number }}
          files: app/build/outputs/apk/debug/*.apk
